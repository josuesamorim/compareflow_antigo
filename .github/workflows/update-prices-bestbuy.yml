name: PRICELAB Best Buy Daily Sync

on:
  schedule:
    # Roda às 08:00 UTC (05:00 da manhã no horário de Brasília)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: "pricelab"

    # Define o fuso horário globalmente para este Job
    env:
      TZ: "America/Sao_Paulo"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          PRICELAB_SUPABASE_DB: ${{ secrets.PRICELAB_SUPABASE_DB }}
          PRICELAB_SUPABASE_DB_DIRECT: ${{ secrets.PRICELAB_SUPABASE_DB_DIRECT }}

      - name: Run BestBuy Sync
        run: node bestbuy_sync_v25.js
        env:
          # Fuso horário garantido na execução do script
          TZ: "America/Sao_Paulo"
          PRICELAB_SUPABASE_DB: ${{ secrets.PRICELAB_SUPABASE_DB }}
          PRICELAB_SUPABASE_DB_DIRECT: ${{ secrets.PRICELAB_SUPABASE_DB_DIRECT }}
          BBY_API_KEY: ${{ secrets.BBY_API_KEY }}
          BBY_BASE_URL: ${{ secrets.BBY_BASE_URL }}

      - name: Revalidate Vercel Cache
        run: node revalidate-next.js
        env:
          TZ: "America/Sao_Paulo"
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          REVALIDATE_BASE_URL: ${{ secrets.REVALIDATE_BASE_URL }}