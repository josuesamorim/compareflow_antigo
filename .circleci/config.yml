version: 2.1

parameters:
  revalidate_mode:
    type: string
    default: "light"

executors:
  node-executor:
    docker:
      - image: cimg/node:20.0
    environment:
      TZ: "America/Sao_Paulo"

jobs:
  ebay_sync:
    executor: node-executor
    steps:
      - checkout
      - run: npm ci
      - run: npx prisma generate
      - run: node scripts/ebay_oficial_sellers_sync_v25.js
      - run: node scripts/revalidate-next.js

  bestbuy_sync:
    executor: node-executor
    steps:
      - checkout
      - run: npm ci
      - run: npx prisma generate
      - run: node scripts/bestbuy_sync_v25.js
      - run: node scripts/revalidate-next.js

  manual_revalidate:
    executor: node-executor
    steps:
      - checkout
      - run: npm ci
      - run:
          command: |
            export REVALIDATE_MODE=<< pipeline.parameters.revalidate_mode >>
            node scripts/revalidate-next.js

  bing_indexnow:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y jq
      - run:
          name: Notify Bing
          command: |
            chmod +x scripts/indexnow_loop.sh || true 
            ./scripts/indexnow_loop.sh

# AQUI ESTÁ A MÁGICA QUE FALTAVA:
workflows:
  version: 2

  # 1. Roda sempre que você salvar algo no GitHub
  on_push:
    jobs:
      - ebay_sync:
          filters:
            branches:
              only: main

  # 2. AGENDAMENTO EBAY (07:00 AM BRT / 10:00 UTC)
  scheduled_ebay:
    triggers:
      - schedule:
          cron: "0 10 * * *"
          filters:
            branches:
              only: main
    jobs:
      - ebay_sync

  # 3. AGENDAMENTO BEST BUY (05:00 AM BRT / 08:00 UTC)
  scheduled_bestbuy:
    triggers:
      - schedule:
          cron: "0 8 * * *"
          filters:
            branches:
              only: main
    jobs:
      - bestbuy_sync

  # 4. AGENDAMENTO BING (09:00 AM BRT / 12:00 UTC)
  scheduled_bing:
    triggers:
      - schedule:
          cron: "0 12 * * *"
          filters:
            branches:
              only: main
    jobs:
      - bing_indexnow

  # 5. GATILHO MANUAL
  manual_trigger:
    when: << pipeline.parameters.revalidate_mode >>
    jobs:
      - manual_revalidate