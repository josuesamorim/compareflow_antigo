name: PRICELAB Ebay Daily Sync

on:
  schedule:
    # Roda todos os dias às 10:00 UTC (07:00 da manhã no Brasil)
    - cron: "0 10 * * *"
  workflow_dispatch: # Permite rodar manualmente para testes

jobs:
  build:
    runs-on: ubuntu-latest
    environment: "pricelab"

    # Define o fuso horário globalmente para este Job (resolve o bug da meia-noite)
    env:
      TZ: "America/Sao_Paulo"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          PRICELAB_SUPABASE_DB: ${{ secrets.PRICELAB_SUPABASE_DB }}
          PRICELAB_SUPABASE_DB_DIRECT: ${{ secrets.PRICELAB_SUPABASE_DB_DIRECT }}

      - name: Run Ebay Sync
        run: node ebay_oficial_sellers_sync_v25.js
        env:
          TZ: "America/Sao_Paulo"
          PRICELAB_SUPABASE_DB: ${{ secrets.PRICELAB_SUPABASE_DB }}
          PRICELAB_SUPABASE_DB_DIRECT: ${{ secrets.PRICELAB_SUPABASE_DB_DIRECT }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}

      - name: Revalidate Vercel Cache
        run: node revalidate-next.js
        env:
          TZ: "America/Sao_Paulo"
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          REVALIDATE_BASE_URL: ${{ secrets.REVALIDATE_BASE_URL }}