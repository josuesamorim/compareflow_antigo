version: 2.1

parameters:
  run_manual_revalidate:
    type: boolean
    default: false
  run_manual_ebay:
    type: boolean
    default: false

executors:
  node-executor:
    docker:
      - image: cimg/node:20.0
    environment:
      TZ: "America/Sao_Paulo"

jobs:
  ebay_sync:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Generate Prisma
          command: npx prisma generate
      - run:
          name: Run Ebay Sync
          command: node scripts/ebay_oficial_sellers_sync_v25.js
      - run:
          name: Revalidate Cache
          command: node scripts/revalidate-next.js

  manual_revalidate:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Manual Revalidation
          command: node scripts/revalidate-next.js

workflows:
  version: 2

  # 1. FLUXO AUTOMÁTICO (Roda pelo Cron às 05:00 AM BR / 08:00 UTC)
  # Removido qualquer condicional "when" para não bloquear o trigger
  fluxo_diario_ebay:
    triggers:
      - schedule:
          cron: "0 8 * * *"
          filters:
            branches:
              only: main
    jobs:
      - ebay_sync

  # 2. FLUXOS MANUAIS (Só aparecem se os parâmetros forem passados como true)
  # Agrupados para melhor organização no painel
  fluxos_manuais:
    when:
      or:
        - << pipeline.parameters.run_manual_ebay >>
        - << pipeline.parameters.run_manual_revalidate >>
    jobs:
      - ebay_sync:
          name: manual_ebay_run
          filters:
            branches:
              only: main
          when: << pipeline.parameters.run_manual_ebay >>
      - manual_revalidate:
          name: manual_revalidate_run
          filters:
            branches:
              only: main
          when: << pipeline.parameters.run_manual_revalidate >>