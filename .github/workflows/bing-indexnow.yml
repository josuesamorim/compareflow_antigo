name: PRICELAB Bing IndexNow Update

on:
  # schedule:
  #   # Roda todos os dias às 12:00 UTC (09:00 da manhã no Brasil)
  #   - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    environment: "pricelab"

    env:
      TZ: "America/Sao_Paulo"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Não precisa de Node/NPM pra rodar curl.
      # Removi pra ficar mais rápido e mais confiável.

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Notify Bing via IndexNow (loop until done)
        env:
          BASE_URL: ${{ secrets.PRICEBASE_URL }}
          INDEXNOW_SECRET: ${{ secrets.INDEXNOW_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_URL:-}" ]; then
            echo "❌ Missing secret PRICEBASE_URL"
            exit 1
          fi

          if [ -z "${INDEXNOW_SECRET:-}" ]; then
            echo "❌ Missing secret INDEXNOW_SECRET"
            exit 1
          fi

          # ✅ Garante que usa www (seu domínio sem www dá 307)
          case "$BASE_URL" in
            https://www.*) ;;
            https://*) echo "⚠️ PRICEBASE_URL sem www. Recomendo usar https://www.pricelab.tech" ;;
            *) echo "❌ PRICEBASE_URL inválida (use https://www.pricelab.tech)"; exit 1 ;;
          esac

          offset=0
          max_loops=50   # safety: 50 * 10k = 500k URLs

          for i in $(seq 1 "$max_loops"); do
            echo ""
            echo "🚀 IndexNow batch #$i | offset=$offset"

            resp="$(curl -sS -X POST "${BASE_URL}/api/indexnow?offset=${offset}" \
              -H "Authorization: Bearer ${INDEXNOW_SECRET}" \
              -H "Content-Type: application/json")"

            echo "$resp" | jq .

            # Se a API retornar erro padronizado, falha o job
            err="$(echo "$resp" | jq -r '.error // empty')"
            if [ -n "$err" ]; then
              msg="$(echo "$resp" | jq -r '.message // empty')"
              status="$(echo "$resp" | jq -r '.status // empty')"
              echo "❌ IndexNow error: ${err} status=${status} message=${msg}"
              exit 1
            fi

            nextOffset="$(echo "$resp" | jq -r '.nextOffset // empty')"

            if [ -z "$nextOffset" ] || [ "$nextOffset" = "null" ]; then
              echo "✅ Done. No nextOffset."
              exit 0
            fi

            offset="$nextOffset"
            echo "⏳ Sleeping 2s..."
            sleep 2
          done

          echo "❌ Safety stop: max_loops reached (${max_loops})."
          exit 1