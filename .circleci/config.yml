version: 2.1

parameters:
  run_manual_revalidate:
    type: boolean
    default: false
  run_manual_ebay:
    type: boolean
    default: false

executors:
  node-executor:
    docker:
      - image: cimg/node:20.0
    environment:
      TZ: "America/Sao_Paulo"

jobs:
  # Job de Sincronia do eBay
  ebay_sync:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Generate Prisma
          command: npx prisma generate
      - run:
          name: Run Ebay Sync
          command: node scripts/ebay_oficial_sellers_sync_v25.js
      - run:
          name: Revalidate Cache
          command: node scripts/revalidate-next.js

  # Job de Revalidação Manual (Vercel)
  manual_revalidate:
    executor: node-executor
    steps:
      - checkout
      - run: npm ci
      - run:
          name: Manual Revalidation
          command: node scripts/revalidate-next.js

workflows:
  version: 2

  # FLUXO AUTOMÁTICO: Roda todos os dias às 05:00 AM (Brasil)
  fluxo_diario_ebay:
    triggers:
      - schedule:
          cron: "0 8 * * *" # 08:00 UTC = 05:00 AM BRT
          filters:
            branches:
              only: main
    jobs:
      - ebay_sync

  # GATILHOS MANUAIS: Controlados pelos parâmetros no painel
  manual_trigger:
    when:
      or:
        - << pipeline.parameters.run_manual_revalidate >>
        - << pipeline.parameters.run_manual_ebay >>
    jobs:
      - manual_revalidate:
          when: << pipeline.parameters.run_manual_revalidate >>
      - ebay_sync:
          when: << pipeline.parameters.run_manual_ebay >>