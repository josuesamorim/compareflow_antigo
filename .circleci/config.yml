version: 2.1

parameters:
  revalidate_mode:
    type: string
    default: "light"

executors:
  node-executor:
    docker:
      - image: cimg/node:20.0
    environment:
      TZ: "America/Sao_Paulo"

jobs:
  ebay_sync:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Generate Prisma
          command: npx prisma generate
      - run:
          name: Run Ebay Sync
          command: node scripts/ebay_oficial_sellers_sync_v25.js
      - run:
          name: Revalidate Cache
          command: node scripts/revalidate-next.js

  bestbuy_sync:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Generate Prisma
          command: npx prisma generate
      - run:
          name: Run BestBuy Sync
          command: node scripts/bestbuy_sync_v25.js
      - run:
          name: Revalidate Cache
          command: node scripts/revalidate-next.js

  bing_indexnow:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install jq
          command: sudo apt-get update && sudo apt-get install -y jq
      - run:
          name: Notify Bing IndexNow
          command: |
            chmod +x scripts/indexnow_loop.sh || true 
            ./scripts/indexnow_loop.sh

  manual_revalidate:
    executor: node-executor
    steps:
      - checkout
      - run: npm ci
      - run:
          name: Manual Revalidation
          command: |
            export REVALIDATE_MODE=<< pipeline.parameters.revalidate_mode >>
            node scripts/revalidate-next.js

workflows:
  version: 2

  # FLUXO EM SEQUÊNCIA INVERTIDA: Best Buy -> eBay -> Bing
  fluxo_diario_pricelab:
    triggers:
      - schedule:
          cron: "0 8 * * *" # Inicia às 05:00 AM Brasil (08:00 UTC)
          filters:
            branches:
              only: main
    jobs:
      - bestbuy_sync # Agora ele é o primeiro da fila
      - ebay_sync:
          requires:
            - bestbuy_sync # Só começa quando o Best Buy terminar
      - bing_indexnow:
          requires:
            - ebay_sync # Só começa quando o eBay terminar

  on_push:
    jobs:
      - bestbuy_sync: # Mudado para rodar Best Buy no push por padrão
          filters:
            branches:
              only: main

  manual_trigger:
    when: << pipeline.parameters.revalidate_mode >>
    jobs:
      - manual_revalidate