#expert-bot-sync.yml
name: PRICELAB Expert Analysis Sync

on:
  schedule:
    # Roda todos os dias às 4:00 UTC (01:00 da manhã no Brasil)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment: "pricelab"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          PRICELAB_SUPABASE_DB: ${{ secrets.PRICELAB_SUPABASE_DB }}
          PRICELAB_SUPABASE_DB_DIRECT: ${{ secrets.PRICELAB_SUPABASE_DB_DIRECT }}

      - name: Run Expert Bot Analysis
        run: node expert_bot_v25.js
        env:
          PRICELAB_SUPABASE_DB: ${{ secrets.PRICELAB_SUPABASE_DB }}
          PRICELAB_SUPABASE_DB_DIRECT: ${{ secrets.PRICELAB_SUPABASE_DB_DIRECT }}

          GEMINI_EXPERT_BOT: ${{ secrets.GEMINI_EXPERT_BOT }}
          GEMINI_EXPERT_BOT2: ${{ secrets.GEMINI_EXPERT_BOT2 }}
          GEMINI_EXPERT_BOT3: ${{ secrets.GEMINI_EXPERT_BOT3 }}
          GEMINI_EXPERT_BOT4: ${{ secrets.GEMINI_EXPERT_BOT4 }}
          GEMINI_EXPERT_BOT5: ${{ secrets.GEMINI_EXPERT_BOT5 }}
          GEMINI_EXPERT_BOT6: ${{ secrets.GEMINI_EXPERT_BOT6 }}
          GEMINI_EXPERT_BOT7: ${{ secrets.GEMINI_EXPERT_BOT7 }}
          GEMINI_EXPERT_BOT8: ${{ secrets.GEMINI_EXPERT_BOT8 }}
          GEMINI_EXPERT_BOT9: ${{ secrets.GEMINI_EXPERT_BOT9 }}
          GEMINI_EXPERT_BOT10: ${{ secrets.GEMINI_EXPERT_BOT10 }}